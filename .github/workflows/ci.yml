name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

permissions:
  contents: read

concurrency:
  # PRとpushで同じグループ名を使用することで重複実行を防ぐ
  # PRの場合はheadブランチ、pushの場合はrefを使用
  group: ci-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: 20.x
  PLAYWRIGHT_BROWSERS_PATH: ~/.cache/ms-playwright

jobs:
  setup:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

    - name: Setup Node.js and Install dependencies
      uses: ./.github/actions/setup-node
      with:
        node-version: ${{ env.NODE_VERSION }}

    - name: Upload node_modules artifact
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
      with:
        name: node-modules
        path: |
          node_modules
          apps/*/node_modules
        retention-days: 1
        compression-level: 9

  lint:
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

    - name: Download node_modules artifact
      uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
      with:
        name: node-modules
        path: .

    - name: Setup Node.js and Install dependencies
      uses: ./.github/actions/setup-node
      with:
        node-version: ${{ env.NODE_VERSION }}

    - name: Run lint
      run: pnpm -r --if-present lint
      env:
        CI: true

  type-check:
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

    - name: Download node_modules artifact
      uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
      with:
        name: node-modules
        path: .

    - name: Setup Node.js and Install dependencies
      uses: ./.github/actions/setup-node
      with:
        node-version: ${{ env.NODE_VERSION }}

    - name: Run type check
      run: pnpm -r --if-present type-check

  unit-tests:
    needs: [lint, type-check]
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        node-version: [ 20.x, 22.x ]

    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

    - name: Download node_modules artifact
      uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
      with:
        name: node-modules
        path: .

    - name: Setup Node.js and Install dependencies
      uses: ./.github/actions/setup-node
      with:
        node-version: ${{ matrix.node-version }}

    - name: Ensure Rollup native binaries are installed
      run: pnpm add -D @rollup/rollup-linux-x64-gnu --filter @swim-hub/web || true

    - name: Run shared package tests
      run: pnpm --filter @swim-hub/shared test

    - name: Run web package tests
      run: pnpm --filter @swim-hub/web test

  e2e-tests:
    needs: unit-tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # pushイベントの場合、同じコミットに対するPRがあればスキップ（重複実行防止）
    # PRイベントの場合は常に実行
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2]

    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

    - name: Restore Playwright browsers cache
      uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
      with:
        path: ${{ env.PLAYWRIGHT_BROWSERS_PATH }}
        key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
        restore-keys: |
          playwright-${{ runner.os }}-

    - name: Restore Next.js build cache
      uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
      with:
        path: |
          apps/web/.next/cache
          apps/web/node_modules/.cache
        key: nextjs-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('apps/web/**/*.{ts,tsx,js,jsx}') }}
        restore-keys: |
          nextjs-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-

    - name: Download node_modules artifact
      uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
      with:
        name: node-modules
        path: .

    - name: Setup Node.js and Install dependencies
      uses: ./.github/actions/setup-node
      with:
        node-version: ${{ env.NODE_VERSION }}

    - name: Install Playwright browsers
      run: pnpm exec playwright install --with-deps

    - name: Setup Supabase CLI
      uses: supabase/setup-cli@b60b5899c73b63a2d2d651b1e90db8d4c9392f51 # v1.6.0
      with:
        version: latest

    - name: Configure Supabase for CI environment
      run: |
        # CI環境用の設定を準備
        echo "🔧 CI環境用のSupabase設定を準備中..."

        # CI環境でGoogle OAuthを無効化（JWT署名鍵はデフォルトを使用）
        echo "🔒 Google OAuthを無効化中..."
        # [auth.external.google]セクションのenabled = trueをfalseに変更
        sed -i '/\[auth\.external\.google\]/,/^\[/ s/^enabled = true/enabled = false/' supabase/config.toml || {
          echo "⚠️ Google OAuthの無効化に失敗しました。"
          exit 1
        }
        echo "✅ config.tomlを更新しました（Google OAuthを無効化、JWT署名鍵はデフォルトを使用）"
      env:
        # CI環境ではGoogle OAuthは不要なため、ダミー値を設定して警告を抑制
        SUPABASE_AUTH_EXTERNAL_GOOGLE_CLIENT_ID: "dummy-client-id"
        SUPABASE_AUTH_EXTERNAL_GOOGLE_SECRET: "dummy-secret"

    - name: Start Supabase stack
      # E2E テストでは edge functions を使用しないため edge-runtime を除外して起動安定性を向上
      run: supabase start --workdir supabase --exclude edge-runtime
      timeout-minutes: 8
      env:
        SUPABASE_DB_PASSWORD: postgres
        # CI環境ではGoogle OAuthは不要なため、ダミー値を設定して警告を抑制
        SUPABASE_AUTH_EXTERNAL_GOOGLE_CLIENT_ID: "dummy-client-id"
        SUPABASE_AUTH_EXTERNAL_GOOGLE_SECRET: "dummy-secret"

    - name: Wait for Supabase to be ready
      run: |
        echo "⏳ Supabaseコンテナの起動を待機中..."
        for i in {1..30}; do
          if curl -s -f http://127.0.0.1:54321/rest/v1/ > /dev/null 2>&1; then
            echo "✅ Supabaseが起動しました"
            exit 0
          fi
          sleep 1
        done
        echo "⚠️ Supabaseの起動確認がタイムアウトしましたが、続行します"

    - name: Reset database
      run: |
        # データベースを直接リセット（コンテナ再起動なし）
        # これにより、コンテナ再起動時のJWT署名鍵読み込み問題を回避
        echo "🔄 データベースをリセット中..."

        DB_CONTAINER=$(docker ps --filter "name=supabase_db" --format "{{.Names}}" | head -n 1)
        if [ -z "$DB_CONTAINER" ]; then
          echo "❌ データベースコンテナが見つかりません"
          exit 1
        fi

        echo "📦 データベースコンテナ: $DB_CONTAINER"

        # データベースをリセット（すべてのスキーマを削除）
        docker exec "$DB_CONTAINER" psql -U postgres -d postgres -c "DROP SCHEMA IF EXISTS public CASCADE; CREATE SCHEMA public; GRANT ALL ON SCHEMA public TO postgres; GRANT ALL ON SCHEMA public TO public;" || {
          echo "⚠️ データベースリセットに失敗しました"
          exit 1
        }

        echo "✅ データベースのリセットが完了しました"
      env:
        SUPABASE_DB_PASSWORD: postgres

    - name: Apply migrations (psql)
      run: |
        DB_CONTAINER=$(docker ps --filter "name=supabase_db" --format "{{.Names}}" | head -n 1)
        if [ -z "$DB_CONTAINER" ]; then
          echo "❌ DB container not found"
          exit 1
        fi

        echo "📦 Applying migrations via psql"

        for file in supabase/migrations/*.sql; do
          echo "➡️ Applying $file"
          docker exec -i "$DB_CONTAINER" psql -U postgres -d postgres < "$file"
        done
      env:
        SUPABASE_DB_PASSWORD: postgres

    - name: Refresh PostgREST schema cache
      run: |
        echo "📡 PostgRESTスキーマキャッシュをリフレッシュ中..."

        # デバッグ: すべてのSupabaseコンテナを確認
        echo "🔍 実行中のSupabaseコンテナ一覧:"
        docker ps --format "{{.Names}}" | grep -E "supabase|postgres" || echo "コンテナが見つかりません"

        # 最も確実な方法: PostgRESTコンテナを再起動してスキーマキャッシュを強制的にリフレッシュ
        # supabase_restで始まるコンテナを検索（PostgRESTコンテナ）
        PGRST_CONTAINER=$(docker ps --filter "name=supabase_rest" --format "{{.Names}}" | head -n 1)

        # もし見つからない場合、restを含むコンテナを検索
        if [ -z "$PGRST_CONTAINER" ]; then
          PGRST_CONTAINER=$(docker ps --format "{{.Names}}" | grep -i "rest" | head -n 1)
        fi

        if [ -n "$PGRST_CONTAINER" ]; then
          echo "🔄 PostgRESTコンテナを再起動: $PGRST_CONTAINER"
          docker restart "$PGRST_CONTAINER"
          echo "⏳ PostgRESTの再起動を待機中..."
          sleep 5
        else
          echo "⚠️ PostgRESTコンテナが見つかりません。代替方法を試します..."
          # 代替方法: PostgreSQL経由でNOTIFYを送る
          DB_CONTAINER=$(docker ps --filter "name=supabase_db" --format "{{.Names}}" | head -n 1)
          if [ -n "$DB_CONTAINER" ]; then
            echo "📦 データベースコンテナ: $DB_CONTAINER"
            docker exec "$DB_CONTAINER" psql -U postgres -d postgres -c "NOTIFY pgrst, 'reload schema';" || true
            sleep 3
          else
            echo "⚠️ コンテナが見つかりません。スキップします。"
          fi
        fi

        # PostgRESTが応答するまで待機（最大30秒）
        echo "📡 PostgREST接続確認..."
        for i in {1..30}; do
          if curl -s -f http://127.0.0.1:54321/rest/v1/ > /dev/null 2>&1; then
            echo "✅ PostgRESTが応答しています"
            exit 0
          fi
          sleep 1
        done
        echo "⚠️ PostgRESTの応答確認がタイムアウトしましたが、続行します"

    - name: Create test users
      run: node apps/web/e2e/scripts/create-test-user.js
      env:
        NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:54321
        SUPABASE_SERVICE_ROLE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImV4cCI6MTk4MzgxMjk5Nn0.EGIM96RAZx35lJzdJsyH-qQwv8Hdp7fsn3W0YpN81IU

    - name: Run E2E tests (shard ${{ matrix.shard }}/2)
      run: pnpm --filter @swim-hub/web test:e2e --shard=${{ matrix.shard }}/2
      env:
        CI: true
        E2E_SUPABASE_MODE: local
        E2E_TEST_EMAIL: ${{ secrets.E2E_TEST_EMAIL }}
        E2E_TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}
        RESEND_API_KEY: "re_dummy"

    - name: Stop Supabase stack
      if: always()
      run: supabase stop --workdir supabase

  build:
    needs: [unit-tests, e2e-tests]
    # e2e-testsがスキップされた場合でも実行
    if: always() && needs.unit-tests.result == 'success' && (needs.e2e-tests.result == 'success' || needs.e2e-tests.result == 'skipped')
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

    - name: Download node_modules artifact
      uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
      with:
        name: node-modules
        path: .

    - name: Setup Node.js and Install dependencies
      uses: ./.github/actions/setup-node
      with:
        node-version: ${{ env.NODE_VERSION }}

    - name: Build for Cloudflare (OpenNext)
      working-directory: apps/web
      run: |
        if [ "${{ github.ref }}" = "refs/heads/main" ]; then
          echo "=== Building with .env.production ==="
          pnpm exec dotenvx run -f .env.production -- pnpm exec opennextjs-cloudflare build
        else
          echo "=== Building with .env.development ==="
          pnpm exec dotenvx run -f .env.development -- pnpm exec opennextjs-cloudflare build
        fi
      env:
        DOTENV_PRIVATE_KEY_PRODUCTION: ${{ secrets.DOTENV_PRIVATE_KEY_PRODUCTION }}
        DOTENV_PRIVATE_KEY_DEVELOPMENT: ${{ secrets.DOTENV_PRIVATE_KEY_DEVELOPMENT }}

    - name: Debug - List build output
      working-directory: apps/web
      run: |
        ls -la .next || echo ".next directory not found"
        ls -la .open-next || echo ".open-next directory not found"

    - name: Upload build output artifact
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
      with:
        name: build-output
        path: |
          apps/web/.next
          apps/web/.open-next
        retention-days: 1
        compression-level: 9
        if-no-files-found: error
        include-hidden-files: true

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: needs.build.result == 'success' && github.ref == 'refs/heads/main' && github.event_name == 'push'
    concurrency:
      group: deploy-production
      cancel-in-progress: false

    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

    - name: Download node_modules artifact
      uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
      with:
        name: node-modules
        path: .

    - name: Download build output artifact
      uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
      with:
        name: build-output
        path: apps/web

    - name: Setup Node.js and Install dependencies
      uses: ./.github/actions/setup-node
      with:
        node-version: ${{ env.NODE_VERSION }}

    - name: Debug - Check downloaded artifacts
      working-directory: apps/web
      run: |
        echo "=== apps/web contents ==="
        ls -la
        echo "=== .next exists? ==="
        ls -la .next || echo ".next not found"
        echo "=== .open-next exists? ==="
        ls -la .open-next || echo ".open-next not found"

    - name: Deploy to Cloudflare Workers
      working-directory: apps/web
      run: |
        # 暗号化された.env.productionをリネームしてOpenNextが読まないようにする
        mv .env.production .env.production.skip || true
        pnpm run deploy:only
      env:
        CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  deploy-preview:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: needs.build.result == 'success' && github.ref == 'refs/heads/develop' && github.event_name == 'push'
    concurrency:
      group: deploy-preview
      cancel-in-progress: false

    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

    - name: Download node_modules artifact
      uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
      with:
        name: node-modules
        path: .

    - name: Download build output artifact
      uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
      with:
        name: build-output
        path: apps/web

    - name: Setup Node.js and Install dependencies
      uses: ./.github/actions/setup-node
      with:
        node-version: ${{ env.NODE_VERSION }}

    - name: Deploy to Cloudflare Workers (Preview)
      working-directory: apps/web
      run: |
        # 暗号化された.env.developmentをリネームしてOpenNextが読まないようにする
        mv .env.development .env.development.skip || true
        pnpm exec wrangler deploy --env preview
      env:
        CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
