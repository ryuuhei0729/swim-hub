name: Extended Test Suite

on:
  workflow_dispatch:
  schedule:
    - cron: '0 21 * * *' # 毎日06:00 JST に実行

permissions:
  contents: read

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  regression-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        node-version: [20.x, 22.x]

    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Setup Node.js and Install dependencies
      uses: ./.github/actions/setup-node
      with:
        node-version: ${{ matrix.node-version }}

    - name: Ensure Rollup native binaries are installed
      run: pnpm add -D @rollup/rollup-linux-x64-gnu --filter @swim-hub/web || true

    - name: Run shared package tests
      run: pnpm --filter @swim-hub/shared test

    - name: Run web package tests
      run: pnpm --filter @swim-hub/web test

    - name: Install Playwright browsers
      run: pnpm exec playwright install --with-deps

    - name: Run E2E tests
      run: pnpm --filter @swim-hub/web test:e2e

    - name: Generate coverage report
      if: ${{ matrix.node-version == '20.x' }}
      run: |
        pnpm --filter @swim-hub/shared test:coverage
        pnpm --filter @swim-hub/web test:coverage

    - name: Upload coverage to Codecov
      if: ${{ matrix.node-version == '20.x' }}
      uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
      with:
        files: ./apps/shared/coverage/lcov.info,./apps/web/coverage/lcov.info
        flags: nightly
        name: codecov-nightly
        fail_ci_if_error: false
