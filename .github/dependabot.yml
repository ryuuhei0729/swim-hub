version: 2
updates:
  # Security updates only for npm/pnpm
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 5
    reviewers:
      - "ryuuhei_0729"
    assignees:
      - "ryuuhei_0729"
    commit-message:
      prefix: "chore"
      include: "scope"
    # Only allow security updates (ignore all version updates)
    ignore:
      - dependency-name: "*"

  # GitHub Actions - keep as-is (low risk)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 5
    reviewers:
      - "ryuuhei_0729"
    assignees:
      - "ryuuhei_0729"
    commit-message:
      prefix: "chore"
      include: "scope"
    groups:
      github-actions:
        patterns:
          - "*"
